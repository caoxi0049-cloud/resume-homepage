[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."resume-assistant"]
  included_files = ["knowledge-base.js", "api/resume-assistant.js"]

[[redirects]]
  from = "/api/resume-assistant"
  to = "/.netlify/functions/resume-assistant"
  status = 200
