<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人求职主页 | 产品经理</title>
    <meta name="description" content="曹曦的个人求职主页，聚焦 CRM、会员营销、SaaS 与中后台产品经验。" />
    <link rel="preload" as="image" href="assets/avatar.jpg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" aria-label="Site navigation">
      <a class="brand-logo" href="#home" aria-label="Home">
        <span class="brand-text" data-field="brandName">Cao Xi</span><span class="brand-dot">.</span>
      </a>
      <nav class="top-nav" aria-label="Primary navigation">
        <a href="#home" class="nav-link is-active" data-i18n="nav.home">首页</a>
        <a href="#about" class="nav-link" data-i18n="nav.about">关于我</a>
        <a href="#experience" class="nav-link" data-i18n="nav.experience">工作经历</a>
        <a href="#education" class="nav-link" data-i18n="nav.education">教育背景</a>
      </nav>
      <div class="header-actions">
        <button class="icon-button" type="button" data-action="toggle-theme" aria-label="Toggle theme">☼</button>
        <button class="language-toggle" type="button" data-action="toggle-language">EN</button>
        <a class="contact-pill" data-field="emailLink" href="mailto:caoxi4929@qq.com">
          <span data-field="phone">18291980049</span>
          <i aria-hidden="true"></i>
          <span data-field="email">caoxi4929@qq.com</span>
        </a>
      </div>
    </header>

    <main>
      <section id="home" class="hero" aria-labelledby="hero-name">
        <div class="hero-copy">
          <p class="hello-line" data-field="heroGreeting">👋 你好，我是曹曦</p>
          <h1 id="hero-name" class="hero-role" data-field="title">产品经理</h1>
          <p class="hero-outline" data-field="heroOutline">PRODUCT MANAGER</p>
          <p class="hero-statement" data-field="statement">
            5年产品经验，长期深耕 CRM、会员营销与数据运营场景。擅长将复杂业务流程抽象为可配置、可复用、可规模化的产品能力，推动产品从 0-1 建设到持续增长。
          </p>
          <div class="hero-actions">
            <a class="primary-action" data-field="resumeLink" href="assets/resume.pdf" download="曹曦_18291980049_产品经理.pdf">
              <span data-i18n="actions.download">下载简历</span>
            </a>
          </div>
          <div class="company-strip">
            <span data-i18n="home.current">曾就职</span>
            <div data-list="companyStrip"></div>
          </div>
        </div>
        <aside class="hero-portrait" aria-label="Profile photo">
          <img data-field="avatar" src="assets/avatar.jpg" alt="Profile photo" fetchpriority="high" />
          <div class="portrait-fallback" data-field="initials">CX</div>
        </aside>
        <a class="scroll-cue" href="#about" aria-label="Scroll to About">⌄<span>SCROLL</span></a>
      </section>

      <section id="about" class="content-section about-section" aria-labelledby="about-title" data-ghost="ABOUT">
        <div class="section-index">01</div>
        <h2 id="about-title" data-i18n="sections.about">关于我</h2>
        <div class="about-card-grid" data-list="aboutCards"></div>
      </section>

      <section id="experience" class="content-section experience-section" aria-labelledby="experience-title" data-ghost="EXPERIENCE">
        <div class="section-index">02</div>
        <h2 id="experience-title" data-i18n="sections.experience">工作经历</h2>
        <div class="timeline" data-list="experiences"></div>
      </section>

      <section id="education" class="content-section education-section" aria-labelledby="education-title" data-ghost="EDUCATION">
        <div class="section-index">03</div>
        <h2 id="education-title" data-i18n="sections.education">教育背景</h2>
        <div class="education-list" data-list="education"></div>
      </section>
    </main>

    <button class="assistant-launcher" type="button" data-action="toggle-assistant" aria-label="Open resume assistant">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.7 8.7 0 0 1-7.8 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.8-5.2A8.4 8.4 0 0 1 4 11.5 8.5 8.5 0 0 1 12.5 3 8.5 8.5 0 0 1 21 11.5Z" />
        <path d="M8.5 11.5h.01M12.5 11.5h.01M16.5 11.5h.01" />
      </svg>
    </button>

    <button class="assistant-nudge" type="button" data-action="toggle-assistant" data-state="hidden">
      想了解更多经历？可以问问简历助手
    </button>

    <aside class="assistant-panel" data-state="closed" aria-label="Resume assistant">
      <div class="assistant-header">
        <div>
          <span class="assistant-spark">✦</span>
          <h2 data-i18n="assistant.title">简历助手</h2>
          <p data-i18n="assistant.subtitle">问我任何关于曹曦经历的问题！</p>
        </div>
        <button type="button" class="assistant-close" data-action="toggle-assistant" aria-label="Close resume assistant">×</button>
      </div>
      <div class="assistant-messages" data-list="assistantMessages"></div>
      <div class="assistant-prompts" data-list="assistantPrompts"></div>
      <form class="assistant-form" data-form="assistant">
        <input type="text" name="question" autocomplete="off" data-i18n-placeholder="assistant.placeholder" placeholder="试着问一个问题..." />
        <button type="submit" aria-label="Send">➤</button>
      </form>
    </aside>

    <footer class="site-footer">
      <span data-field="footerName">曹曦 · 产品经理</span>
      <span data-field="footerContact">18291980049 · caoxi4929@qq.com</span>
    </footer>

    <script src="knowledge-base.js"></script>
    <script src="assistant-config.js"></script>
    <script src="profile-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
